server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Importa os MIME types corretos
    include /etc/nginx/mime.types;

    # Cabeçalhos de Segurança
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    # (Atenção: A política CSP foi omitida para não bloquear os websockets e iframes do Firebase, mas pode ser adicionada no futuro)

    # Configuração principal para o React Router (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy reverso para a API do Dify
    location /api/dify/ {
        # O React faz requisição para /api/dify/ e o Nginx encaminha para o Dify real:
        proxy_pass https://api.dify.ai/v1/;
        proxy_ssl_server_name on;
        
        # Repassa os headers originais para o Dify
        proxy_set_header Host api.dify.ai;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Suporte para Server-Sent Events (Streaming do Chat)
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 24h;
    }

    # Configuração de cache para arquivos estáticos (melhora o desempenho)
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public, max-age=15552000, immutable";
    }
}