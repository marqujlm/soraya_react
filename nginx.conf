server {
    listen ${PORT};
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Permite upload de arquivos grandes globalmente no servidor
    client_max_body_size 100M;

    include /etc/nginx/mime.types;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Rota específica para o Chat (Streaming/SSE)
    location /api/dify/chat-messages {
        proxy_pass VITE_ENDPOINT_DIFY_PLACEHOLDER/chat-messages;
        proxy_ssl_server_name on;
        
        proxy_set_header Authorization "Bearer VITE_API_DIFY_PLACEHOLDER";
        proxy_set_header Host api.dify.ai;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Configurações VITAIS para Streaming (SSE)
        proxy_set_header Connection "";
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 24h;
    }

    # Rota geral para a API do Dify (Upload de Arquivos, etc)
    location /api/dify/ {
        # Sem trailing slash para não perder caminhos no proxy
        proxy_pass VITE_ENDPOINT_DIFY_PLACEHOLDER/;
        proxy_ssl_server_name on;
        
        proxy_set_header Authorization "Bearer VITE_API_DIFY_PLACEHOLDER";
        proxy_set_header Host api.dify.ai;
        
        # Mudar a versão do HTTP e preservar TODOS os Headers vitais de upload
        proxy_http_version 1.1;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Fundamental: não mexer no chunked nem na conexão durante upload de arquivos
        proxy_set_header Connection "keep-alive";
    }

    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public, max-age=15552000, immutable";
    }
}

