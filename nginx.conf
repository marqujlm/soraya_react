server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Permite upload de arquivos grandes globalmente no servidor
    client_max_body_size 100M;

    include /etc/nginx/mime.types;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy para a API Gemini do Google (Esconde a chave do frontend)
    location /api/gemini/ {
        # O backend oficial da API do Gemini
        proxy_pass https://generativelanguage.googleapis.com/v1beta/;
        proxy_ssl_server_name on;
        
        # Injeta a chave da API como header secreto "x-goog-api-key"
        proxy_set_header x-goog-api-key VITE_GEMINI_API_KEY_PLACEHOLDER;
        proxy_set_header Host generativelanguage.googleapis.com;
        
        # Mudar a versão do HTTP
        proxy_http_version 1.1;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Necessário para Streaming (SSE)
        proxy_set_header Connection "";
        chunked_transfer_encoding off;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 24h;
    }

    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public, max-age=15552000, immutable";
    }
}

