steps:
# 1. Build do Dockerfile injetando as variáveis de ambiente cadastradas no Cloud Build como "Build Arguments" (--build-arg)
- name: "gcr.io/cloud-builders/docker"
  entrypoint: "bash"
  args:
    - "-c"
    - |
      docker build \\
        --build-arg VITE_FIREBASE_API_KEY=$$_VITE_FIREBASE_API_KEY \\
        --build-arg VITE_FIREBASE_AUTH_DOMAIN=$$_VITE_FIREBASE_AUTH_DOMAIN \\
        --build-arg VITE_FIREBASE_PROJECT_ID=$$_VITE_FIREBASE_PROJECT_ID \\
        --build-arg VITE_FIREBASE_STORAGE_BUCKET=$$_VITE_FIREBASE_STORAGE_BUCKET \\
        --build-arg VITE_FIREBASE_MESSAGING_SENDER_ID=$$_VITE_FIREBASE_MESSAGING_SENDER_ID \\
        --build-arg VITE_FIREBASE_APP_ID=$$_VITE_FIREBASE_APP_ID \\
        --build-arg VITE_API_DIFY=$$_VITE_API_DIFY \\
        --build-arg VITE_ENDPOINT_DIFY=$$_VITE_ENDPOINT_DIFY \\
        -t gcr.io/$PROJECT_ID/soraya-react:$COMMIT_SHA \\
        .
  secretEnv:
    - "_VITE_FIREBASE_API_KEY"
    - "_VITE_FIREBASE_AUTH_DOMAIN"
    - "_VITE_FIREBASE_PROJECT_ID"
    - "_VITE_FIREBASE_STORAGE_BUCKET"
    - "_VITE_FIREBASE_MESSAGING_SENDER_ID"
    - "_VITE_FIREBASE_APP_ID"
    - "_VITE_API_DIFY"
    - "_VITE_ENDPOINT_DIFY"

# 2. Envia a imagem final pronta para o Container Registry do GCP
- name: "gcr.io/cloud-builders/docker"
  args: ["push", "gcr.io/$PROJECT_ID/soraya-react:$COMMIT_SHA"]

# 3. Faz o deploy automatizado dessa imagem na sua conta do Cloud Run
- name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
  entrypoint: gcloud
  args:
    - "run"
    - "deploy"
    - "soraya-react"
    - "--image"
    - "gcr.io/$PROJECT_ID/soraya-react:$COMMIT_SHA"
    - "--region"
    - "us-central1"
    - "--allow-unauthenticated"
    - "--port"
    - "8080"

# Diz ao Google Cloud Build quais variáveis secretas ele deve esperar receber do Gerenciador de Segredos do GCP
availableSecrets:
  secretManager:
  - versionName: projects/$PROJECT_ID/secrets/VITE_FIREBASE_API_KEY/versions/latest
    env: _VITE_FIREBASE_API_KEY
  - versionName: projects/$PROJECT_ID/secrets/VITE_FIREBASE_AUTH_DOMAIN/versions/latest
    env: _VITE_FIREBASE_AUTH_DOMAIN
  - versionName: projects/$PROJECT_ID/secrets/VITE_FIREBASE_PROJECT_ID/versions/latest
    env: _VITE_FIREBASE_PROJECT_ID
  - versionName: projects/$PROJECT_ID/secrets/VITE_FIREBASE_STORAGE_BUCKET/versions/latest
    env: _VITE_FIREBASE_STORAGE_BUCKET
  - versionName: projects/$PROJECT_ID/secrets/VITE_FIREBASE_MESSAGING_SENDER_ID/versions/latest
    env: _VITE_FIREBASE_MESSAGING_SENDER_ID
  - versionName: projects/$PROJECT_ID/secrets/VITE_FIREBASE_APP_ID/versions/latest
    env: _VITE_FIREBASE_APP_ID
  - versionName: projects/$PROJECT_ID/secrets/VITE_API_DIFY/versions/latest
    env: _VITE_API_DIFY
  - versionName: projects/$PROJECT_ID/secrets/VITE_ENDPOINT_DIFY/versions/latest
    env: _VITE_ENDPOINT_DIFY

images:
  - "gcr.io/$PROJECT_ID/soraya-react:$COMMIT_SHA"

